<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 5rem;
            margin: 0;
            color: #dc3545;
        }
        h2 {
            font-size: 2rem;
            margin-top: 10px;
            font-weight: 400;
        }
        p {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <h1>403</h1>
    <h2>Forbidden</h2>
    <p>You don't have permission to access this resource or your request was blocked.</p>
</body>
</html>
